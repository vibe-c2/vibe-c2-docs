site_name: Vibe C2 Docs
site_description: Product and technical documentation for the Vibe C2 project
site_url: https://vibe-c2.github.io/vibe-c2-docs/
repo_url: https://github.com/vibe-c2/vibe-c2-docs
repo_name: vibe-c2/vibe-c2-docs

theme:
  name: mkdocs
  color_mode: auto
  user_color_mode_toggle: true

markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js
  - js/mermaid-init.js

nav:
  - Home: index.md
  - Foundations:
      - Project Scope: project-scope.md
      - Tech Requirements: tech-requirements.md
      - Architecture Draft: architecture.md
      - Core Responsibilities: core-responsibilities.md
      - Module Types: module-types.md
      - Message Flow: message-flow.md
      - Message Contracts: message-contracts.md
      - Channel Obfuscation Profiles: channel-obfuscation-profiles.md
      - Future Steps & Ideas: future-steps.md
  - Go Packages Ecosystem:
      - Overview: golang-packages.md
      - vibe-c2-golang-protocol: golang-package-protocol.md
      - vibe-c2-golang-channel-core: golang-package-channel-core.md
      - vibe-c2-http-channel: golang-package-http-channel.md
      - vibe-c2-telegram-channel: golang-package-telegram-channel.md
      - Channel Authoring (15 min): channel-authoring-15min.md
  - ADR:
      - Overview: adr/README.md
      - ADR-0001 Golang Channel Core Foundation: adr/0001-golang-channel-core-foundation.md
